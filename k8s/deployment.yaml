apiVersion: apps/v1
kind: Deployment
metadata:
  name: bitcoin-trading-app
  labels:
    app: bitcoin-trading-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bitcoin-trading-app
  template:
    metadata:
      labels:
        app: bitcoin-trading-app
    spec:
      containers:
      - name: bitcoin-trading-app
        image: bitcoin-trading-app:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: bitcoin-trading-app
  labels:
    app: bitcoin-trading-app
spec:
  type: NodePort
  selector:
    app: bitcoin-trading-app
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080
    protocol: TCP
    name: http
